<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Box Model</title>
</head>
<body>
    <span>container body</span>

    <div id="conteudo">
        Container div

        <div class="caixa">
            Relativo
        </div>

        <div class="caixa">
            Absoluto
        </div>

        <div class="caixa">
            Fixo
        </div>
    </div>
    <div id="relativo" class="caixa">
        Relativo
    </div>
    <div id="absoluto" class="caixa">
        Absoluto
    </div>
    <div id="fixo" class="caixa">
        Fixo
    </div>

</body>
</html>
<style type="text/css">
    body{
        background: #61bd8c;
    }
    #conteudo{
        background: #FFFFFF;
        padding: 10px;
        width: 900px;
        margin: 30px auto;
    }
    .caixa{
        background: red;
        margin: 10px;
        width: 100px;
        height: 100px;
        color: #FFFFFF;
    }

    #relativo{
        position: relative;
        left: 30px;
    }

    #absoluto{
        position: absolute;
        left: 30px;
    }

    #fixo{
        position: fixed;
        left: 200px;
        top: 0px;
    }

</style>
